<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Homework Website</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="header">
    <h1>AI Homework Website</h1>
    <p>Functional Local Website with 5 Modules</p>
  </header>

  <nav class="navbar">
    <button class="nav-btn active" data-target="todo-section">To-Do</button>
    <button class="nav-btn" data-target="notes-section">Notes</button>
    <button class="nav-btn" data-target="calculator-section">Calculator</button>
    <button class="nav-btn" data-target="quiz-section">Quiz</button>
    <button class="nav-btn" data-target="api-section">Quote Generator</button>
  </nav>

  <main class="container">
    <section id="todo-section" class="module active-section">
      <h2>1. To-Do List</h2>
      <div class="input-group">
        <input type="text" id="todo-input" placeholder="Enter a new task" />
        <button id="add-todo-btn">Add Task</button>
      </div>
      <ul id="todo-list" class="list"></ul>
    </section>

    <section id="notes-section" class="module">
      <h2>2. Notes</h2>
      <div class="input-group vertical">
        <textarea id="note-input" placeholder="Write your note here..."></textarea>
        <button id="save-note-btn">Save Note</button>
      </div>
      <div id="notes-list" class="notes-grid"></div>
    </section>

    <section id="calculator-section" class="module">
      <h2>3. Calculator</h2>
      <div class="calculator">
        <input type="text" id="calc-display" readonly />
        <div class="calc-buttons">
          <button class="calc-btn">7</button>
          <button class="calc-btn">8</button>
          <button class="calc-btn">9</button>
          <button class="calc-btn operator">/</button>

          <button class="calc-btn">4</button>
          <button class="calc-btn">5</button>
          <button class="calc-btn">6</button>
          <button class="calc-btn operator">*</button>

          <button class="calc-btn">1</button>
          <button class="calc-btn">2</button>
          <button class="calc-btn">3</button>
          <button class="calc-btn operator">-</button>

          <button class="calc-btn">0</button>
          <button class="calc-btn">.</button>
          <button id="equals-btn" class="calc-btn equals">=</button>
          <button class="calc-btn operator">+</button>

          <button id="clear-btn" class="calc-btn clear">C</button>
        </div>
      </div>
    </section>

    <section id="quiz-section" class="module">
      <h2>4. Quiz</h2>
      <div class="quiz-box">
        <p id="quiz-question">Question will appear here</p>
        <div id="quiz-options" class="quiz-options"></div>
        <button id="next-question-btn">Next</button>
        <button id="restart-quiz-btn" style="display: none;">Restart Quiz</button>
        <p id="quiz-result"></p>
      </div>
    </section>

    <section id="api-section" class="module">
      <h2>5. Quote Generator (API)</h2>
      <div class="quote-box">
        <p id="quote-text">Click the button to load a random quote.</p>
        <h4 id="quote-author"></h4>
        <button id="get-quote-btn">Get Random Quote</button>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>Created for AI Homework Submission</p>
  </footer>

  <script src="js/app.js"></script>
  <script src="js/todo.js"></script>
  <script src="js/notes.js"></script>
  <script src="js/calculator.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/api.js"></script>
</body>
</html>
